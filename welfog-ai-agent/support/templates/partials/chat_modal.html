<div class="confirm-backdrop" id="deleteConfirmModal">
    <div class="confirm-modal">
        <div class="confirm-title">Delete chat?</div>
        <div class="confirm-text">Are you sure you want to delete this chat? This action cannot be undone.</div>
        <div class="confirm-actions">
            <button type="button" class="confirm-btn cancel" onclick="hideDeleteModal()">No</button>
            <button type="button" class="confirm-btn delete" onclick="confirmDeleteChat()">Yes</button>
        </div>
    </div>
</div>
